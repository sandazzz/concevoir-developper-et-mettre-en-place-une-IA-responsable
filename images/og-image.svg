<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1b4332"/>
      <stop offset="100%" style="stop-color:#2d6a4f"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-gradient)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="150" fill="#52b788" opacity="0.1"/>
  <circle cx="1100" cy="530" r="200" fill="#74c69d" opacity="0.1"/>
  <circle cx="900" cy="150" r="100" fill="#95d5b2" opacity="0.1"/>

  <!-- Main icon: Leaf + Circuit -->
  <g transform="translate(600, 200)">
    <!-- Leaf shape -->
    <path d="M0,-80 Q60,-60 80,0 Q60,60 0,80 Q-60,60 -80,0 Q-60,-60 0,-80"
          fill="#52b788" opacity="0.3"/>
    <path d="M0,-60 Q45,-45 60,0 Q45,45 0,60 Q-45,45 -60,0 Q-45,-45 0,-60"
          fill="#74c69d" opacity="0.5"/>

    <!-- Circuit nodes -->
    <circle cx="0" cy="0" r="12" fill="#fff"/>
    <circle cx="-30" cy="-20" r="6" fill="#95d5b2"/>
    <circle cx="30" cy="-20" r="6" fill="#95d5b2"/>
    <circle cx="-30" cy="20" r="6" fill="#95d5b2"/>
    <circle cx="30" cy="20" r="6" fill="#95d5b2"/>

    <!-- Circuit lines -->
    <line x1="0" y1="0" x2="-30" y2="-20" stroke="#fff" stroke-width="2"/>
    <line x1="0" y1="0" x2="30" y2="-20" stroke="#fff" stroke-width="2"/>
    <line x1="0" y1="0" x2="-30" y2="20" stroke="#fff" stroke-width="2"/>
    <line x1="0" y1="0" x2="30" y2="20" stroke="#fff" stroke-width="2"/>
  </g>

  <!-- Title -->
  <text x="600" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="#ffffff" text-anchor="middle">
    Formation IA Responsable
  </text>

  <!-- Subtitle -->
  <text x="600" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#95d5b2" text-anchor="middle">
    Concevoir des solutions IA durables et frugales
  </text>

  <!-- Tags -->
  <g transform="translate(600, 480)">
    <rect x="-280" y="-20" width="120" height="40" rx="20" fill="#52b788" opacity="0.3"/>
    <text x="-220" y="8" font-family="system-ui, sans-serif" font-size="18" fill="#fff" text-anchor="middle">8 Modules</text>

    <rect x="-80" y="-20" width="160" height="40" rx="20" fill="#52b788" opacity="0.3"/>
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="18" fill="#fff" text-anchor="middle">Interactif</text>

    <rect x="160" y="-20" width="120" height="40" rx="20" fill="#52b788" opacity="0.3"/>
    <text x="220" y="8" font-family="system-ui, sans-serif" font-size="18" fill="#fff" text-anchor="middle">CC BY-SA</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#1b4332"/>
  <text x="600" y="618" font-family="system-ui, sans-serif" font-size="16" fill="#74c69d" text-anchor="middle">
    greenit.fr | ademe.fr | ecoresponsable.numerique.gouv.fr
  </text>
</svg>
